<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F9FAFB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F9FAFB" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="b-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0B0F14"/>

  <!-- Gradient ring -->
  <circle cx="50" cy="50" r="44" stroke="url(#ring-grad)" stroke-width="3.5" stroke-linecap="round"
    stroke-dasharray="246 30" stroke-dashoffset="-8"/>

  <!-- Bold B -->
  <text
    x="50" y="67"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="48"
    font-weight="800"
    fill="url(#b-grad)"
    text-anchor="middle"
    letter-spacing="-2"
  >B</text>

  <!-- Upward arrow through the B -->
  <path
    d="M50 74 L50 22"
    stroke="url(#arrow-grad)"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <path
    d="M43.5 30 L50 22 L56.5 30"
    stroke="url(#arrow-grad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
